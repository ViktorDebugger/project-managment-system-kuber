apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: project-task-db-pvc
  namespace: project-management
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-task-db
  namespace: project-management
  labels:
    app: project-task-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-task-db
  template:
    metadata:
      labels:
        app: project-task-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: project-management-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project-management-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: project_task_db
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - user
                - -d
                - project_task_db
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - user
                - -d
                - project_task_db
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: project-task-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: project-task-db
  namespace: project-management
  labels:
    app: project-task-db
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: project-task-db
