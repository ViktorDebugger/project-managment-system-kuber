apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-auth
  namespace: project-management
  labels:
    app: user-auth
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: user-auth
  template:
    metadata:
      labels:
        app: user-auth
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z user-db 5432; do echo waiting for user-db; sleep 2; done"
      containers:
        - name: user-auth
          image: project-managment/user-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: project-management-secrets
                  key: USER_AUTH_DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: project-management-secrets
                  key: JWT_SECRET
            - name: PORT
              value: "3001"
---
apiVersion: v1
kind: Service
metadata:
  name: user-auth
  namespace: project-management
  labels:
    app: user-auth
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: user-auth
