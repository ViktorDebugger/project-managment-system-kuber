apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace
  namespace: project-management
  labels:
    app: workspace
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: workspace
  template:
    metadata:
      labels:
        app: workspace
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z workspace-db 5432; do echo waiting for workspace-db; sleep 2; done"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"
        - name: wait-for-user-auth
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z user-auth 3001; do echo waiting for user-auth; sleep 2; done"
      containers:
        - name: workspace
          image: project-managment/workspace:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: project-management-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: project-management-secrets
                  key: WORKSPACE_DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: project-management-secrets
                  key: JWT_SECRET
            - name: PORT
              value: "3002"
---
apiVersion: v1
kind: Service
metadata:
  name: workspace
  namespace: project-management
  labels:
    app: workspace
spec:
  type: ClusterIP
  ports:
    - port: 3002
      targetPort: 3002
      protocol: TCP
      name: http
  selector:
    app: workspace
