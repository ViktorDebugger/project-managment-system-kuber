apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: project-management
  labels:
    app: api-gateway
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-user-auth
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z user-auth 3001; do echo waiting for user-auth; sleep 2; done"
        - name: wait-for-workspace
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z workspace 3002; do echo waiting for workspace; sleep 2; done"
        - name: wait-for-project-task
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z project-task 3003; do echo waiting for project-task; sleep 2; done"
      containers:
        - name: api-gateway
          image: project-managment/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: project-management-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: project-management-secrets
                  key: JWT_SECRET
            - name: PORT
              value: "3000"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: project-management
  labels:
    app: api-gateway
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
      nodePort: 30000
  selector:
    app: api-gateway
